<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Read the entire Bible free — beautiful typography, audio, bookmarks, and progress. The Word in Context.">
  <meta name="theme-color" content="#c9a227">
  <link rel="canonical" href="https://www.thewordincontext.org/read">
  <title>Read the Bible — The Word in Context</title>
  <link rel="manifest" href="/manifest.webmanifest?v=2">
  <link rel="icon" href="/icons/icon.svg?v=2" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    :root {
      --gold: #c9a227;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --header-bar: 52px;
      --header-h: calc(var(--header-bar) + var(--safe-top));
    }
    [data-theme='light'] {
      --bg: #f7f4ee;
      --bg-elevated: #fffdf8;
      --text: #1a1814;
      --text-soft: #5c574d;
      --border: rgba(26, 24, 20, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }
    #reader-app { display: flex; flex-direction: column; min-height: 100dvh; min-height: 100vh; }
    .reader-header {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: var(--header-h);
      padding: var(--safe-top) 12px 0 8px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
    }
    .reader-site-title {
      margin: 0 0 2px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .reader-main { flex: 1; min-height: 0; }
    .reader-status { padding: 24px 16px; text-align: center; color: var(--text-soft); }
  </style>
  <link rel="stylesheet" href="/reader.css?v=5" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="/reader.css?v=5"></noscript>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&amp;family=Source+Sans+3:wght@400;500;600;700&amp;display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&amp;family=Source+Sans+3:wght@400;500;600;700&amp;display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,400;7..72,500;7..72,600&amp;family=Source+Sans+3:wght@400;500;600;700&amp;display=swap"></noscript>
</head>
<body>
  <noscript>
    <h1>Read the Bible — The Word in Context</h1>
    <p>Free Bible reader with beautiful typography, audio, bookmarks, and original-language study tools.</p>
  </noscript>
  <div id="reader-app">
    <header class="reader-header" id="reader-header">
      <button type="button" class="reader-icon-btn" id="btn-nav" aria-label="Books and chapters">☰</button>
      <div class="reader-title-block">
        <h1 class="reader-site-title">Read the Bible</h1>
        <button type="button" id="btn-title" aria-label="Open navigation">
          <span class="reader-book-title" id="header-book">John</span>
          <p class="reader-chapter-sub" id="header-chapter">Chapter 1</p>
        </button>
      </div>
      <div class="reader-header-actions">
        <a href="/app?view=library" class="reader-link">Library</a>
        <a href="/app" class="reader-link">Chat</a>
        <button type="button" class="reader-icon-btn" id="btn-theme" aria-label="Toggle dark mode">◐</button>
        <button type="button" class="reader-icon-btn" id="btn-settings" aria-label="Reading settings">⚙</button>
      </div>
    </header>

    <div class="reader-continue" id="continue-wrap" hidden>
      <div class="reader-continue-card" id="continue-card" role="button" tabindex="0">
        <div>
          <div class="reader-continue-label">Continue reading</div>
          <div class="reader-continue-ref" id="continue-ref">John 1</div>
        </div>
        <span aria-hidden="true">→</span>
      </div>
    </div>

    <main class="reader-main" id="reader-main">
      <div class="reader-scroll" id="reader-scroll">
        <div class="reader-status" id="reader-loading">Loading Scripture…</div>
      </div>
    </main>

    <footer class="reader-audio-bar" id="audio-bar">
      <button type="button" class="reader-audio-play" id="btn-audio-play" aria-label="Play chapter">▶</button>
      <div class="reader-audio-info">
        <div class="reader-audio-title" id="audio-label">Listen to chapter</div>
        <div class="reader-audio-progress"><div class="reader-audio-progress-fill" id="audio-progress"></div></div>
      </div>
      <button type="button" class="reader-audio-mode-btn" id="btn-audio-mode" hidden title="Switch BSB Audio / Device voice">Audio</button>
      <button type="button" class="reader-audio-voice-btn" id="btn-voice-picker">Voice</button>
    </footer>
  </div>

  <div class="nav-overlay" id="nav-overlay"></div>
  <aside class="nav-sheet" id="nav-sheet" aria-hidden="true">
    <div class="nav-sheet-header">
      <span class="nav-sheet-title" id="sheet-title">Navigate</span>
      <button type="button" class="reader-icon-btn" id="btn-close-nav" aria-label="Close">✕</button>
    </div>
    <div class="nav-tabs" id="nav-tabs">
      <button type="button" class="nav-tab active" data-tab="books">Books</button>
      <button type="button" class="nav-tab" data-tab="chapters" id="tab-chapters" disabled>Chapters</button>
      <button type="button" class="nav-tab" data-tab="bookmarks">Saved</button>
      <button type="button" class="nav-tab" data-tab="settings">Settings</button>
    </div>
    <div class="nav-sheet-body" id="nav-body"></div>
    <div class="nav-trans-row">
      <label for="nav-trans-select">Translation (entire Bible — free)</label>
      <select id="nav-trans-select" aria-label="Bible translation"></select>
    </div>
  </aside>

  <script src="/bible-core.js?v=2"></script>
  <script src="/study-core.js?v=2"></script>
  <script src="/audio-engine.js?v=2"></script>
  <script src="/voice-picker.js?v=2"></script>
  <script src="/share-video.js?v=6"></script>
  <script src="/reader.js?v=8"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
