services:
  - type: web
    name: the-word-in-context
    runtime: node
    plan: free
    # ci is faster/more reliable than bare install; omit devDeps (we have none, but keeps install lean).
    # better-sqlite3 compiles natively — needs Node 22 + build tools (Render provides them).
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    # Persistent disk for the SQLite DB (users.db) so admin users, tester accounts, trial status etc. survive deploys.
    # Mount path must be a subdirectory (cannot be /). Only files under this path persist.
    # After adding this, go to the service in Render dashboard > Disks and add/attach the disk if it doesn't show up.
    disks:
      - name: data
        mountPath: /data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Pin Node so better-sqlite3 prebuilds match (see package.json engines + .nvmrc)
      - key: NODE_VERSION
        value: "22.12.0"
      # Non-sensitive config (can be declared here or set in dashboard)
      - key: TRIAL_DAYS
        value: "7"
      - key: TESTER_TRIAL_DAYS
        value: "14"
      - key: DEMO_LIMIT
        value: "1"
      # Use www — bare thewordincontext.org redirects to www (checkout success + magic links must match).
      - key: RENDER_EXTERNAL_URL
        value: https://www.thewordincontext.org
      # Whop checkout links (7-day free trial on both — set to match your monthly/yearly plans in Whop)
      - key: WHOP_CHECKOUT_URL_MONTHLY
        value: https://whop.com/checkout/plan_W9vAA0xyptzgt
      - key: WHOP_CHECKOUT_URL_YEARLY
        value: https://whop.com/checkout/plan_xjGkPczz1CWju
      # Third plan ID (if any) goes in WHOP_PLAN_IDS only — webhook allowlist, not a signup button
      - key: WHOP_PLAN_IDS
        value: plan_hWWAQiPvpAYKN,plan_xjGkPczz1CWju,plan_W9vAA0xyptzgt

      # --- Sensitive secrets (NEVER put real values in this file or git) ---
      # Add these ONLY in the Render dashboard (Environment tab) and mark as Secret:
      #   XAI_API_KEY
      #   WHOP_WEBHOOK_SECRET
      #   RESEND_API_KEY
      #   FROM_EMAIL   (e.g. The Word in Context <onboarding@resend.dev> while domain pending)
      #   JWT_SECRET
      #   ADMIN_PASSWORD
      #   TTS_SERVER_URL   (URL of your hosted TTS service, e.g. https://openai-edge-tts-wtcd.onrender.com — enables the "Use Premium Hosted Voices" toggle with zero setup for users)
      #   (ELEVENLABS_API_KEY if using managed TTS for an alternate path)
      #
      # This file defines the service + safe defaults.
      # Real secrets are injected by the platform at runtime as process.env.
