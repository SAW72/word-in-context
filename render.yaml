services:
  - type: web
    name: the-word-in-context
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    # Persistent disk for SQLite (users.db). This is REQUIRED so accounts, trials, manual_free etc.
    # survive deploys and container restarts. The code auto-detects /data if the disk is mounted.
    # IMPORTANT: After pushing this YAML, go to Render dashboard > your service > Disks tab
    # and confirm/add the disk if it doesn't appear. Then redeploy.
    disks:
      - name: data
        mountPath: /data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Non-sensitive config (can be declared here or set in dashboard)
      - key: TRIAL_DAYS
        value: "7"
      - key: TESTER_TRIAL_DAYS
        value: "14"
      - key: DEMO_LIMIT
        value: "5"
      # RENDER_EXTERNAL_URL should be set to your actual URL (for magic links, Stripe redirects, etc.)
      # Use your custom domain once DNS is switched, or the onrender URL while testing.
      # - key: RENDER_EXTERNAL_URL
      #   value: https://thewordincontext.org
      # or https://your-service.onrender.com while on render domain

      # --- Sensitive secrets (NEVER put real values in this file or git) ---
      # Add these ONLY in the Render dashboard (Environment tab) and mark as Secret:
      #   XAI_API_KEY
      #   STRIPE_SECRET_KEY
      #   STRIPE_WEBHOOK_SECRET
      #   STRIPE_PRICE_ID   (can be non-secret if you want)
      #   RESEND_API_KEY
      #   FROM_EMAIL   (e.g. The Word in Context <onboarding@resend.dev> while domain pending)
      #   JWT_SECRET
      #   ADMIN_PASSWORD
      #   TTS_SERVER_URL   (URL of your hosted TTS service, e.g. https://openai-edge-tts-wtcd.onrender.com — enables the "Use Premium Hosted Voices" toggle with zero setup for users)
      #   (ELEVENLABS_API_KEY if using managed TTS for an alternate path)
      #
      # This file defines the service + safe defaults.
      # Real secrets are injected by the platform at runtime as process.env.
